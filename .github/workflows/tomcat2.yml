name: Java WebApp CI-CD Pipeline

on:
  push:
    branches: master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: SonarQube Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=train-ticket \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Upload Artifact to Nexus
        run: |
          mvn deploy -DskipTests \
            -Dnexus.url=http://${{ secrets.NEXUS_HOST }}/repository/maven-releases/ \
            -Dusername=${{ secrets.NEXUS_USER }} \
            -Dpassword=${{ secrets.NEXUS_PASS }}

      - name: Deploy WAR to Tomcat Manager
        run: |
          WAR_FILE=$(ls target/*.war | head -n 1)
          echo "Deploying $WAR_FILE to Tomcat..."
          curl -T $WAR_FILE "http://${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASS }}@${{ secrets.TOMCAT_HOST }}:8080/manager/text/deploy?path=/myapp&update=true"
